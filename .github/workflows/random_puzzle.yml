name: Random Puzzle Command

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    concurrency:
      group: random-puzzle-check
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: python random_puzzle_check.py

      - name: Commit state if it exists
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          if [ -f random_state.json ]; then
            git add random_state.json
            git commit -m "update random command state" || echo "no changes"
            git push
          else
            echo "No state file yet"
          fi
